# Server Configuration
server.port=3000
spring.application.name=url-shortener

# Database Configuration (H2 - similar to SQLite)
spring.datasource.url=jdbc:h2:file:./data/urlshortener
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging - disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.root=INFO
logging.level.com.urlshortener=DEBUG

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# URL Shortener Configuration
app.base-url=http://localhost:3000
app.default-expiry-days=1
app.code-length=6

# Cache Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=3600s

# Rate Limiting Configuration
app.rate-limit.shorten.capacity=10
app.rate-limit.shorten.refill-tokens=10
app.rate-limit.shorten.refill-duration=PT15M
app.rate-limit.redirect.capacity=30
app.rate-limit.redirect.refill-tokens=30
app.rate-limit.redirect.refill-duration=PT1M

# Scheduled Tasks
app.cleanup.cron=0 0 0 * * ?
