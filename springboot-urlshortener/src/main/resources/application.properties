# ===================================================================
# Spring Boot 4.0.3 Configuration
# URL Shortener Application
# ===================================================================

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=3000
spring.application.name=url-shortener

# ===================================================================
# DATABASE CONFIGURATION (H2 - similar to SQLite)
# ===================================================================
spring.datasource.url=jdbc:h2:file:./data/urlshortener
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===================================================================
# H2 CONSOLE (for debugging - disable in production)
# ===================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.root=INFO
logging.level.com.urlshortener=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===================================================================
# CORS CONFIGURATION
# ===================================================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===================================================================
# URL SHORTENER CONFIGURATION
# ===================================================================
app.base-url=http://localhost:3000
app.default-expiry-days=1
app.code-length=6

# ===================================================================
# CACHE CONFIGURATION
# ===================================================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=3600s

# ===================================================================
# RATE LIMITING CONFIGURATION
# ===================================================================
app.rate-limit.shorten.capacity=10
app.rate-limit.shorten.refill-tokens=10
app.rate-limit.shorten.refill-duration=PT15M
app.rate-limit.redirect.capacity=30
app.rate-limit.redirect.refill-tokens=30
app.rate-limit.redirect.refill-duration=PT1M

# ===================================================================
# SCHEDULED TASKS CONFIGURATION
# ===================================================================
app.cleanup.cron=0 0 0 * * ?
app.cleanup.enabled=true

# ===================================================================
# ACTUATOR CONFIGURATION (Spring Boot 4)
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ===================================================================
# ASYNC CONFIGURATION
# ===================================================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-

# ===================================================================
# JACKSON CONFIGURATION
# ===================================================================
# spring.jackson.serialization.write-dates-as-timestamps=false
# spring.jackson.time-zone=UTC

# ===================================================================
# BANNER
# ===================================================================
spring.banner.location=classpath:banner.txt
