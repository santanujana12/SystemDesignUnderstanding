# Production Profile Configuration

# Logging
logging.level.root=WARN
logging.level.com.urlshortener=INFO

# Disable H2 console in production
spring.h2.console.enabled=false

# Hide SQL
spring.jpa.show-sql=false

# Production database (override with environment variables)
# spring.datasource.url=${DB_URL}
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}

# Base URL (override with environment variable)
app.base-url=${BASE_URL:http://localhost:3000}

# CORS (override with environment variable)
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
